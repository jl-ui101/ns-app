<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#0E1220">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Nachtschicht">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Nachtschicht</title>
<style>
  html,body { margin:0; background:#0E1220; }
  body { color:#EAEDF6; font-family:system-ui,sans-serif; min-height:100vh;
    min-height:100dvh; display:flex; align-items:center; justify-content:center; }
  .box { width:min(340px,86vw); text-align:center; }
  .dot { width:10px; height:10px; border-radius:50%; background:#FF7A6B; display:inline-block;
    margin-bottom:14px; animation:beat 1.15s ease-in-out infinite; }
  @keyframes beat { 0%,100%{transform:scale(1)} 30%{transform:scale(1.35)} }
  h1 { font-size:19px; margin:0 0 4px; letter-spacing:-0.01em; }
  p { color:#8A93AE; font-size:12.5px; margin:0 0 20px; }
  input[type=password] { width:100%; box-sizing:border-box; background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.12); border-radius:12px; color:#EAEDF6;
    font-size:15px; padding:13px 14px; outline:none; text-align:center; }
  input[type=password]:focus { border-color:#FF7A6B; }
  button#go { width:100%; margin-top:10px; background:#FF7A6B; border:none; border-radius:12px;
    color:#0E1220; font-size:14px; font-weight:700; padding:13px; cursor:pointer; }
  label { display:flex; gap:8px; align-items:center; justify-content:center;
    color:#8A93AE; font-size:12px; margin-top:14px; cursor:pointer; }
  #err { color:#FF7A6B; font-size:12.5px; margin-top:12px; min-height:16px; }
  #install { display:none; margin-top:18px; background:none; border:1px solid rgba(255,255,255,0.18);
    color:#8A93AE; font-size:12px; padding:9px 14px; border-radius:999px; cursor:pointer; }
</style>
</head>
<body>
<div class="box" id="gate">
  <span class="dot"></span>
  <h1>Nachtschicht</h1>
  <p>Privates Gesundheits-Dashboard — Passwort eingeben</p>
  <input type="password" id="pw" placeholder="Passwort" autocomplete="current-password">
  <button id="go">Entsperren</button>
  <label><input type="checkbox" id="rem" checked> Auf diesem Gerät merken</label>
  <div id="err"></div>
  <button id="install">Als App installieren</button>
</div>

const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
async function unlock(pw, silent) {
  try {
    const km = await crypto.subtle.importKey("raw", new TextEncoder().encode(pw), "PBKDF2", false, ["deriveKey"]);
    const key = await crypto.subtle.deriveKey(
      { name:"PBKDF2", salt:b64(ENC.s), iterations:ENC.it, hash:"SHA-256" },
      km, { name:"AES-GCM", length:256 }, false, ["decrypt"]);
    const pt = await crypto.subtle.decrypt({ name:"AES-GCM", iv:b64(ENC.n) }, key, b64(ENC.c));
    if (document.getElementById("rem")?.checked) localStorage.setItem("ns-key", pw);
    document.open(); document.write(new TextDecoder().decode(pt)); document.close();
  } catch(e) {
    if (silent) { localStorage.removeItem("ns-key"); return; }
    document.getElementById("err").textContent = "Falsches Passwort.";
  }
}
document.getElementById("go").onclick = () => unlock(document.getElementById("pw").value, false);
document.getElementById("pw").addEventListener("keydown", e => { if (e.key === "Enter") unlock(e.target.value, false); });

// Service Worker (relativer Pfad -> funktioniert in jedem GitHub-Pages-Unterordner)
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js").catch(()=>{});
}
// Install-Prompt
let deferred;
window.addEventListener("beforeinstallprompt", e => { e.preventDefault(); deferred = e;
  const b = document.getElementById("install"); b.style.display = "inline-block";
  b.onclick = async () => { b.style.display="none"; deferred.prompt(); await deferred.userChoice; deferred = null; };
});

const saved = localStorage.getItem("ns-key");
if (saved) unlock(saved, true);
